CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
# Force this side to act as peripheral (central is the default option)
CONFIG_ZMK_SPLIT_BLE_ROLE_CENTRAL=n

CONFIG_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# Enable USB CDC-ACM console so we can capture logs via /dev/ttyACM*
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="Scylla Right"
CONFIG_USB_DEVICE_MANUFACTURER="ZMK Project"
CONFIG_USB_DEVICE_VID=0x1D50
CONFIG_USB_DEVICE_PID=0x615E

# Ensure console uses CDC-ACM
CONFIG_SHELL_BACKEND_SERIAL_INIT_PRIORITY=50
