snippet:
  name: zmk-usb-logging
  description: Enable USB CDC-ACM logging for debugging
  append:
    - file: scylla.conf
      content: |
        CONFIG_CONSOLE=y
        CONFIG_LOG=y
        CONFIG_LOG_DEFAULT_LEVEL=3
        CONFIG_LOG_MODE_IMMEDIATE=y
        CONFIG_USB_DEVICE_STACK=y
        CONFIG_USB_CDC_ACM=y
        CONFIG_USB_DEVICE_PRODUCT="Scylla"
        CONFIG_USB_DEVICE_MANUFACTURER="ZMK Project"
        CONFIG_USB_DEVICE_VID=0x1D50
        CONFIG_USB_DEVICE_PID=0x615E